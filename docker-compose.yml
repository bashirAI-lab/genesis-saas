version: '3.8'

services:
  # ─── NestJS Backend API ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: saas_api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      APP_ENV: development
      MAIN_DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Next.js Frontend ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: saas_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: 'http://localhost:3001/api/v1'
    depends_on:
      - api

  # ─── PostgreSQL (Main + Tenant Databases) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_main
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Caching & Session) ─────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (Optional — Database Management UI) ──────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: saas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@saas.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
