apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-api
  namespace: saas-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: saas-api
  template:
    metadata:
      labels:
        app: saas-api
    spec:
      containers:
        - name: api
          image: your-registry/saas-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: APP_ENV
              value: "production"
            - name: MAIN_DB_HOST
              value: "saas-postgres"
            - name: REDIS_HOST
              value: "saas-redis"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: jwt-refresh-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: saas-api
  namespace: saas-platform
spec:
  selector:
    app: saas-api
  ports:
    - port: 80
      targetPort: 3001
