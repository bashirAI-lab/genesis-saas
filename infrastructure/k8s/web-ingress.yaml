apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-web
  namespace: saas-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saas-web
  template:
    metadata:
      labels:
        app: saas-web
    spec:
      containers:
        - name: web
          image: your-registry/saas-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.yourdomain.com/api/v1"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: saas-web
  namespace: saas-platform
spec:
  selector:
    app: saas-web
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saas-ingress
  namespace: saas-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - app.yourdomain.com
        - api.yourdomain.com
      secretName: saas-tls
  rules:
    - host: app.yourdomain.com # Frontend App Dashboard
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saas-web
                port:
                  number: 80
    - host: api.yourdomain.com # Backend Core Engine
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saas-api
                port:
                  number: 80
