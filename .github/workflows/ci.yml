name: SaaS Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    # Needs root installation to manage workspaces
    - name: Install Monorepo Dependencies
      run: npm ci

    - name: Build Shared Packages
      run: |
        # If your shared packages require a build step
        # npm run build --workspace=packages/shared
        echo "Shared packages verified"

    - name: Build Backend (NestJS)
      working-directory: ./apps/backend
      run: npm run build
      
    # - name: Test Backend
    #   working-directory: ./apps/backend
    #   run: npm test

  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install Monorepo Dependencies
      run: npm ci

    - name: Build Frontend (Next.js)
      working-directory: ./apps/frontend
      run: npm run build
      env:
        # Mocking environment variables for build time requirements
        NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
